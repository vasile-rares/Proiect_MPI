name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Render
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy hook
        run: curl --fail-with-body -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

      - name: Trigger frontend deploy hook
        run: curl --fail-with-body -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"