name: CI

on:
    push:
        branches:
            - "**"

jobs:
    lint:
        name: Lint (Frontend)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20.19.0"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - run: npm ci
            - run: npx eslint src

    test-backend:
        name: Build & Test Backend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.x"

            - run: dotnet build Keyless.sln
            - run: dotnet test Keyless.sln --no-build --logger "console;verbosity=minimal"

    build-frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20.19.0"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - run: npm ci
            - run: npm run build

            - uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: frontend/dist
                  retention-days: 1

    e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        services:
            postgres:
                image: postgres:17-alpine
                env:
                    POSTGRES_DB: keyless_e2e
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U postgres -d keyless_e2e"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20.19.0"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.x"

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Install Playwright browser
              run: npx playwright install chromium --with-deps
              working-directory: frontend

            - name: Build backend
              run: dotnet build Keyless.sln
              working-directory: backend

            - name: Run E2E tests
              run: npm run e2e
              working-directory: frontend
              env:
                  CI: "true"
                  DOTNET_NO_BUILD: "1"
                  E2E_POSTGRES_CONNECTION_STRING: Host=127.0.0.1;Port=5432;Database=keyless_e2e;Username=postgres;Password=postgres

            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: frontend/playwright-report/
                  retention-days: 7
