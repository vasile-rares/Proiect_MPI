name: CI/CD

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ─────────────────────────────────────────────────────────────
    # 1. Lint – ESLint on the frontend source
    # ─────────────────────────────────────────────────────────────
    lint:
        name: Lint (Frontend)
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - run: npm ci
            - run: npx eslint src

    # ─────────────────────────────────────────────────────────────
    # 2. Build & unit-test the .NET backend
    # ─────────────────────────────────────────────────────────────
    test-backend:
        name: Build & Test Backend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.x"

            - run: dotnet build Keyless.sln
            - run: dotnet test Keyless.sln --no-build --logger "console;verbosity=minimal"

    # ─────────────────────────────────────────────────────────────
    # 3. Build the frontend (Vite production build)
    # ─────────────────────────────────────────────────────────────
    build-frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: frontend
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - run: npm ci
            - run: npm run build

            - uses: actions/upload-artifact@v4
              with:
                  name: frontend-dist
                  path: frontend/dist
                  retention-days: 1

    # ─────────────────────────────────────────────────────────────
    # 4. End-to-end tests (Playwright)
    #    – playwright.config.js auto-starts backend + frontend via webServer
    #    – backend is pre-built and started with --no-build (faster / avoids timeout)
    # ─────────────────────────────────────────────────────────────
    e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.x"

            - name: Install frontend dependencies
              run: npm ci
              working-directory: frontend

            - name: Install Playwright browser
              run: npx playwright install chromium --with-deps
              working-directory: frontend

            - name: Build backend
              run: dotnet build Keyless.sln
              working-directory: backend

            - name: Run E2E tests
              run: npm run e2e
              working-directory: frontend
              env:
                  CI: "true"
                  # Tells start-api.cjs to pass --no-build to dotnet run
                  DOTNET_NO_BUILD: "1"

            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: frontend/playwright-report/
                  retention-days: 7

    # ─────────────────────────────────────────────────────────────
    # 5. Deploy – trigger Render deploy hooks (main branch only)
    #    Requires secrets:
    #    - RENDER_BACKEND_DEPLOY_HOOK_URL
    #    - RENDER_FRONTEND_DEPLOY_HOOK_URL
    #    Set them in: GitHub → Settings → Secrets → Actions
    # ─────────────────────────────────────────────────────────────
    deploy:
        name: Deploy to Render
        runs-on: ubuntu-latest
        needs: [lint, build-frontend, test-backend, e2e]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        steps:
            - name: Trigger backend deploy hook
              run: curl --fail-with-body -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}"

            - name: Trigger frontend deploy hook
              run: curl --fail-with-body -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}"
