# Render Infrastructure-as-Code
# Docs: https://render.com/docs/yaml-spec

services:
    - type: web
      name: keyless-frontend
      runtime: static
      rootDir: frontend
      buildCommand: npm ci && npm run build
      staticPublishPath: dist
      autoDeployTrigger: off

      routes:
          - type: rewrite
            source: /*
            destination: /index.html

      headers:
          - path: /index.html
            name: Cache-Control
            value: no-cache, no-store, must-revalidate

      envVars:
          - key: VITE_API_URL
            value: https://keyless-backend.onrender.com/api

    - type: web
      name: keyless-backend
      runtime: docker
      plan: free
      rootDir: backend
      dockerfilePath: backend/Dockerfile
      dockerContext: backend
      healthCheckPath: /health
      autoDeployTrigger: off

      envVars:
          - key: ConnectionStrings__DefaultConnection
            value: Data Source=/tmp/Keyless.db
          - key: Jwt__Key
            generateValue: true
          - key: Jwt__Issuer
            value: Keyless.API
          - key: Jwt__Audience
            value: Keyless.Client
          - key: Jwt__ExpiryMinutes
            value: "60"
          - key: Cors__AllowedOrigins__0
            value: https://keyless-frontend.onrender.com
