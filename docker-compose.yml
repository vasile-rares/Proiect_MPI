services:
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - "5232:8080"
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - Jwt__Key=${JWT_KEY}
            - Jwt__Issuer=Keyless.API
            - Jwt__Audience=Keyless.Client
            - Jwt__ExpiryMinutes=60
            - ConnectionStrings__DefaultConnection=Data Source=/data/Keyless.db
        volumes:
            - db-data:/data
        networks:
            - keyless
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "3000:80"
        environment:
            # nginx.conf.template substitutes this into the /api proxy_pass directive
            - BACKEND_URL=http://backend:8080
        depends_on:
            - backend
        networks:
            - keyless
        restart: unless-stopped

volumes:
    db-data:

networks:
    keyless:
