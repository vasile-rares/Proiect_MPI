services:
    postgres:
        image: postgres:17-alpine
        ports:
            - "${POSTGRES_PORT:-55432}:5432"
        environment:
            - POSTGRES_DB=${POSTGRES_DB:-keyless}
            - POSTGRES_USER=${POSTGRES_USER:-postgres}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-keyless}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - keyless
        restart: unless-stopped

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - "5232:8080"
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - "Jwt__Key=${JWT_KEY-}"
            - Jwt__Issuer=Keyless.API
            - Jwt__Audience=Keyless.Client
            - Jwt__ExpiryMinutes=60
            - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-keyless};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
        networks:
            - keyless
        restart: unless-stopped

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "3000:80"
        environment:
            # nginx.conf.template substitutes this into the /api proxy_pass directive
            - BACKEND_URL=http://backend:8080
        depends_on:
            - backend
        networks:
            - keyless
        restart: unless-stopped

volumes:
    postgres-data:

networks:
    keyless:
